name: Sync Submissions

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: read

jobs:
  generate:
    if: github.event.label.name == 'accepted'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/issue-to-content.mjs
        env:
          KYM_ISSUE_BODY: ${{ github.event.issue.body }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs data
          git commit -m "chore: sync accepted submission" || echo "No changes to commit"
          git push
